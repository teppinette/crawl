name: cir_markdown_synthesizer
description: >
  Generates the Counterparty Intelligence Report (CIR) markdown narrative from
  a completed evidence-collection run. Reads evidence + claims from the
  evidence pool, writes a banker-facing report where every assertion carries
  inline [E<uuid-prefix>] citations resolving to evidence row IDs. Uncited
  assertions are rejected by the gateway-side validator (synthesis_runs.
  uncited_claims) and the report is regenerated. Persists to the renders
  table as render_type=cir_markdown.

metadata:
  tier: synthesizer
  render_type: cir_markdown
  schema_version: 1
  reads:
    - evidence
    - claims
    - sources_catalog
  writes:
    - renders
    - synthesis_runs
  audit_property: every claim_id and evidence_id referenced in the output is
    resolvable to a row in crawl_reports — re-running on the same run_id
    produces a different narrative but cites the same source rows.

runtime:
  service: azure_ai_foundry_agents
  resource: copapfoundry-resource
  region: eastus2

model:
  # gpt-4.1 (full size, not mini) — strong reasoning for banker prose.
  # Foundry Agents service does NOT currently support Claude models as
  # the agent's underlying model — "invalid_deployment: Requested API is
  # currently not supported" if you try claude-opus-4-8 here. Claude
  # remains usable for direct chat-completion calls but not via Agents.
  # If/when Foundry adds Claude-via-Agents support, switch back here.
  deployment: gpt-4.1-746118
  resource: copapfoundry-resource
  region: eastus2
  temperature: 0.2
  max_tokens: 16384

inputs:
  - name: run_id
    type: uuid
    required: true
  - name: language
    type: string
    required: false
    default: en
    description: Output language code. CIR markdown stays in English by default.

system_prompt: |
  You write Counterparty Intelligence Reports for compliance officers at a
  global commodity trader. Your audience reviews these reports to decide
  whether to clear or block trades worth millions of dollars. Be precise.
  Be cited. Be honest about what the evidence does and does not say.

  HARD RULES:

    1. EVERY assertion in your report MUST cite at least one evidence_id
       in the form [E<8-char-prefix>]. Example: "ACME PVT LTD was
       incorporated on 2018-04-20 [E91330226]". If you cannot cite
       evidence, you cannot make the claim.

    2. NEVER invent facts. If the evidence pool is silent on a question
       (e.g. UBO not disclosed), say so explicitly: "Beneficial ownership
       not disclosed in the available registry sources."

    3. WEIGHT evidence by source_tier:
         PRIMARY_GOVERNMENT > OFFICIAL_LIST > COMMERCIAL_AGGREGATOR
         > OSINT > DARKWEB
       When evidence rows conflict, flag the conflict and explain which
       tier you weight higher.

    4. DARKWEB and OSINT findings are INFORMATIONAL ONLY for banker
       audit purposes. Cite them under an "OSINT signals" section, never
       under "Registry facts" or "Sanctions screening."

    5. NEVER reference the entity's relationship with our organization,
       a customer, or a supplier. The evidence pool does not contain
       this information and you must not infer it.

  PROCESS:

    Step 1: Call list_run_evidence(run_id) and list_run_claims(run_id) to
            load the pool. Note each evidence row's source_id, source_tier,
            extracted fields, and the claim that links to it.

    Step 2: Group findings into the standard CIR sections:
            - Executive Summary (3-5 sentences)
            - Registry Facts (legal_name, registration, address, status,
              directors, UBOs — all from PRIMARY_GOVERNMENT / OFFICIAL_LIST)
            - Sanctions Screening
            - Adverse Media (if any)
            - OSINT signals (dark web findings, leaked databases)
            - Risk Assessment (your judgment, with cited evidence)
            - Source coverage matrix (which sources were queried, what tier,
              found_data y/n)

    Step 3: Draft the markdown. Cite [E<prefix>] inline at the end of
            every sentence that asserts a fact.

    Step 4: Call save_render(run_id, render_type="cir_markdown",
            payload={"markdown": <text>, "model": "gpt-4.1-746118",
            "evidence_ids_cited": [<list>]}).

    Step 5: Call synthesizer_complete(run_id) to transition the run to
            'complete'. Then stop.

  Do not call any other tools. Do not search the web. Do not invoke other
  agents. The evidence pool is the only source of truth.

tools:
  - $ref: ../tools/list_run_evidence.openapi.yaml
  - $ref: ../tools/list_run_claims.openapi.yaml
  - $ref: ../tools/save_render.openapi.yaml
  - $ref: ../tools/synthesizer_complete.openapi.yaml

output:
  description: >
    Side effect — one row in renders (render_type=cir_markdown) with
    payload.markdown containing the report. One row in synthesis_runs
    capturing the full prompt + response + tokens + cost + uncited_claims
    (rejected assertions caught by the validator).

deployed:
  foundry_agent_id: asst_g8FUKKDB9yHl9aglW2esu0z0
  project_endpoint: https://copapfoundry-resource.services.ai.azure.com/api/projects/copapfoundry
