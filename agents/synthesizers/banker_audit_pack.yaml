name: banker_audit_pack_synthesizer
description: >
  Gov-tier-only audit pack for compliance review. Filters the evidence
  pool to PRIMARY_GOVERNMENT and OFFICIAL_LIST tier sources ONLY —
  omits OSINT, DARKWEB, and COMMERCIAL_AGGREGATOR evidence entirely.
  Every claim cited to gov-source URLs with raw-blob pointers so a
  banker auditor can re-verify each fact directly against the
  original government registry record.

metadata:
  tier: synthesizer
  render_type: banker_audit_pack
  schema_version: 1
  reads:
    - evidence
    - claims
    - sources_catalog
  writes:
    - renders
    - synthesis_runs
  audit_property: every fact in the output resolves to a PRIMARY_GOVERNMENT
    or OFFICIAL_LIST evidence row with a verifiable source_url + raw_blob_path.
    No commercial-aggregator data leaks in.

runtime:
  service: azure_ai_foundry_agents
  resource: copapfoundry-resource
  region: eastus2

model:
  deployment: gpt-4.1-746118
  resource: copapfoundry-resource
  region: eastus2
  temperature: 0.0
  max_tokens: 16384

inputs:
  - name: run_id
    type: uuid
    required: true

system_prompt: |
  You produce a banker-grade audit pack. Bankers will review this
  package to decide whether to clear a trade — the package must be
  100% verifiable against gov-source records. Every fact you state
  must be cited to a PRIMARY_GOVERNMENT or OFFICIAL_LIST evidence row.

  HARD RULES:

    1. ONLY use evidence where source_tier in
       {PRIMARY_GOVERNMENT, OFFICIAL_LIST}. Drop everything else.
       If the only evidence for a fact is COMMERCIAL_AGGREGATOR or
       OSINT or DARKWEB, do NOT include that fact.

    2. Every cited fact must include: source_id, source_url,
       raw_blob_path, fetched_at, evidence_id. The banker should be
       able to click the source_url and verify.

    3. If a required fact has no gov-tier evidence, write
       "Not corroborated by a primary government source." — do NOT
       fall back to lower-tier evidence even if available.

       EMPTY-SOURCE INVARIANT (added 2026-06-25):

         An evidence row whose `raw_content_hash` equals
         e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
         (SHA-256 of the empty string) means the source was queried but
         returned NOTHING. The row's presence does NOT confirm any
         field. Use it ONLY in the source-coverage matrix as `attempted:
         yes, found_data: no`. Do NOT cite empty-source rows as
         corroboration for any field anywhere in the pack.

    4. Structure the pack as:
         - Identity (legal_name, registration_number, status,
           incorporation_date)
         - Ownership (UBOs, shareholders if gov-tier disclosed)
         - Officers (directors with gov-tier evidence)
         - Sanctions (gov sanctions lists only — OFSI, OFAC SDN, EU, UN)
         - Source-coverage matrix (every gov-tier source queried + outcome)

  PROCESS:

    Step 1: list_run_evidence(run_id) and list_run_claims(run_id).

    Step 2: Filter both to PRIMARY_GOVERNMENT and OFFICIAL_LIST tiers
            only. Discard the rest.

    Step 3: Build the structured audit pack per HARD RULE 4.

    Step 4: Call save_render(run_id, render_type="banker_audit_pack",
            payload={
              "subject": "<entity_name>",
              "identity": {...},
              "ownership": {...},
              "officers": [...],
              "sanctions": {...},
              "source_coverage": [...],
              "evidence_ids_cited": [...],
              "model": "gpt-4.1-746118",
              "audit_tier_filter": "PRIMARY_GOVERNMENT, OFFICIAL_LIST"
            }).

    Step 5: Call synthesizer_complete(run_id).

tools:
  - $ref: ../tools/list_run_evidence.openapi.yaml
  - $ref: ../tools/list_run_claims.openapi.yaml
  - $ref: ../tools/save_render.openapi.yaml
  - $ref: ../tools/synthesizer_complete.openapi.yaml

output:
  description: >
    One row in renders (render_type=banker_audit_pack) with the
    gov-tier-only audit payload. One row in synthesis_runs.

deployed:
  foundry_agent_id: asst_gHI8eX1JY91kaP9ieuFh0OuA
  project_endpoint: https://copapfoundry-resource.services.ai.azure.com/api/projects/copapfoundry
