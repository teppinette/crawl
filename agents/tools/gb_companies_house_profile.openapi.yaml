openapi: 3.0.3
info:
  title: UK Companies House Profile
  version: "1.0.0"
  description: Fetch the full Companies House profile for a UK company by company_number.
servers:
  - url: http://20.94.45.219:8400/api/v1
  - url: http://20.94.45.219:8400/api/v1
security:
  - ApiKeyAuth: []
paths:
  /sources/gb_companies_house/profile:
    post:
      operationId: gb_companies_house_profile
      summary: Fetch UK company profile by number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [company_number]
              properties:
                company_number: { type: string, example: "00445790" }
      responses:
        '200':
          description: Company profile
          content:
            application/json:
              schema:
                type: object
                required: [source_id, source_url, fetched_at]
                properties:
                  source_id: { type: string, example: gb_companies_house }
                  source_url: { type: string }
                  fetched_at: { type: string, format: date-time }
                  profile:
                    type: object
                    additionalProperties: true
        '404':
          description: company_number not found
components:
  securitySchemes:
    ApiKeyAuth: { type: apiKey, in: header, name: X-API-Key }
