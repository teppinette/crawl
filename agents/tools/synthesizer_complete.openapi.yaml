openapi: 3.0.3
info:
  title: Synthesizer Complete
  version: "1.0.0"
  description: >
    Mark synthesis done. Transitions cir_runs.status from 'synthesizing'
    to 'complete'. Sets completed_at timestamp.
servers:
  - url: https://crawl-gateway-v2.orangemoss-d67e0a38.eastus2.azurecontainerapps.io/api/v1
paths:
  /evidence/runs/{run_id}/synthesizer_complete:
    post:
      operationId: synthesizer_complete
      summary: Mark synthesizer run done
      parameters:
        - in: path
          name: run_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Status transitioned to complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { type: string, format: uuid }
                  status: { type: string, example: complete }
