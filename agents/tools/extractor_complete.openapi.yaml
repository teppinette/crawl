openapi: 3.0.3
info:
  title: Extractor Complete
  version: "1.0.0"
  description: >
    Mark the claim-extraction phase done. Transitions cir_runs.status
    from 'extracting' to 'synthesizing' so the synthesizer can pick it up.
servers:
  - url: https://crawl-gateway-v2.orangemoss-d67e0a38.eastus2.azurecontainerapps.io/api/v1
paths:
  /evidence/runs/{run_id}/extractor_complete:
    post:
      operationId: extractor_complete
      summary: Mark extractor run done
      parameters:
        - in: path
          name: run_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Status transitioned to synthesizing
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { type: string, format: uuid }
                  status: { type: string, example: synthesizing }
                  claim_count: { type: integer }
